<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR Sensors PoC - Phase 1</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <!-- AR.js location-based support -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@1.0.0/dist/aframe-look-at-component.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="panel" id="navigatorPanel">
      <h1>AR Sensor Navigator</h1>
      <label for="sensorSelect">Choose sensor</label>
      <select id="sensorSelect"></select>
      <div class="panel-actions">
        <button id="followBtn" type="button">Follow Sensor</button>
      </div>
      <div id="status">Choose a sensor to start navigation.</div>
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    >
      <a-camera gps-new-camera></a-camera>

      <a-assets>
        <a-asset-item id="arrow-obj" src="arrow.obj"></a-asset-item>
        <a-asset-item id="arrow-mtl" src="arrow.mtl"></a-asset-item>
      </a-assets>

      <a-entity
        position="0 -1 -3"
        id="arrow"
        obj-model="obj: #arrow-obj; mtl: #arrow-mtl"
        scale="0.1 0.1 0.1"
        rotation="80 0 0"
        look-at-y
      ></a-entity>
    </a-scene>
    <script src="app3.js"></script>
  </body>
</html>
